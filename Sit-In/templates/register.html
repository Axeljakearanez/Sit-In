<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - CCS Sit-in Monitoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <a href="{{ url_for('login') }}" class="back-btn">Back</a>

    <div class="card">
        <h2>Sign up</h2>

        {% if error %}
            <div class="alert-error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="alert-success">
                {{ success }} <a href="{{ url_for('login') }}">Click here to Login</a>.
            </div>
        {% endif %}

        <div class="columns">

            <div class="form-col">
                <form method="POST" action="{{ url_for('register') }}">

                    <div class="field-wrap">
                        <input type="text" name="id_number" required>
                        <span class="field-label">ID Number</span>
                    </div>

                    <div class="field-wrap">
                        <input type="text" name="last_name" required>
                        <span class="field-label">Last Name</span>
                    </div>

                    <div class="field-wrap">
                        <input type="text" name="first_name" required>
                        <span class="field-label">First Name</span>
                    </div>

                    <div class="field-wrap">
                        <input type="text" name="middle_name">
                        <span class="field-label">Middle Name</span>
                    </div>

                    <div class="field-wrap">
                        <input type="number" name="course_level" min="1" max="5" value="1" required>
                        <span class="field-label">Course Level</span>
                    </div>

                    <div class="field-wrap">
                        <input type="password" name="password" required>
                        <span class="field-label">Password</span>
                    </div>

                    <div class="field-wrap">
                        <input type="password" name="repeat_password" required>
                        <span class="field-label">Repeat your password</span>
                    </div>

                    <div class="field-wrap">
                        <input type="email" name="email" required>
                        <span class="field-label">Email</span>
                    </div>

                    <div class="field-wrap">
                        <select name="course">
                            <option value="BSIT">BSIT</option>
                            <option value="BSCS">BSCS</option>
                            <option value="BSIS">BSIS</option>
                            <option value="ACT">ACT</option>
                        </select>
                        <span class="field-label">Course</span>
                    </div>

                    <div class="field-wrap">
                        <input type="text" name="address">
                        <span class="field-label">Address</span>
                    </div>

                    <button type="submit" class="btn-register">Register</button>

                </form>
            </div>

            <div class="img-col">
                <img src="{{ url_for('static', filename='signup.avif') }}" alt="signup">
                <img src="{{ url_for('static', filename='UC.webp') }}" alt="UC">
            </div>

        </div>
    </div>

</body>
</html>
