<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCS Sit-in Monitoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="#" class="brand">College of Computer Studies Sit-in Monitoring System</a>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Community ▾</a>
            <a href="#">About</a>
            <a href="{{ url_for('login') }}"><strong>Login</strong></a>
            <a href="{{ url_for('register') }}">Register</a>
        </div>
    </nav>

    <div class="page-body">
        <div class="login-container">

            <div class="logo-side">
                <img src="{{ url_for('static', filename='ccs.webp') }}" alt="CCS Logo">
            </div>

            <div class="form-side">
                {% if error %}
                    <div class="error-msg">{{ error }}</div>
                {% endif %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="field-wrap">
                        <input type="text" name="id_number" placeholder="Enter a valid id number">
                        <span class="field-label">ID Number</span>
                    </div>
                    <div class="field-wrap">
                        <input type="password" name="password" placeholder="Enter password">
                        <span class="field-label">Password</span>
                    </div>
                    <div class="options-row">
                        <label><input type="checkbox" name="remember"> Remember me</label>
                        <a href="#">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn-login">Login</button>
                </form>

                <p class="register-link">
                    <b>Don't have an account?</b> <a href="{{ url_for('register') }}">Register</a>
                </p>
            </div>

        </div>
    </div>

</body>
</html>
